name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    name: Smoke
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install sdl3

      - name: Run smoke test
        run: ./scripts/macos/run_smoke.sh

  main-tests:
    name: Main Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install sdl3

      - name: Run full main tests
        run: ./scripts/macos/run_main_tests.sh
